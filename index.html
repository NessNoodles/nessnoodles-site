<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NessNoodles Mystery Boxes</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #fffafc;
      color: #2d2a32;
    }

    header {
      background: linear-gradient(90deg, #ffb6c1, #ffd966, #c8a2ff);
      padding: 25px;
      text-align: center;
      color: white;
    }

    .container {
      padding: 20px;
      text-align: center;
      max-width: 1000px;
      margin: auto;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .product {
      background: white;
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .price {
      font-size: 1.4rem;
      font-weight: bold;
      margin: 10px 0;
    }

    .buy-btn {
      display: inline-block;
      margin-top: 12px;
      padding: 12px 18px;
      border-radius: 8px;
      background: #ff8fab;
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    .note {
      margin-top: 30px;
      background: white;
      padding: 20px;
      border-radius: 14px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }
  </style>
</head>

  </header>
