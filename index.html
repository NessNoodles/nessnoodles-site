<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NessNoodles Mystery Boxes</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #fffafc;
}

header {
  background: linear-gradient(90deg, #ffb6c1, #ffd966, #c8a2ff);
  padding: 20px;
  text-align: center;
  color: white;
}

.container {
  padding: 20px;
  text-align: center;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
}

.product {
  background: white;
  border-radius: 12px;
  padding: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

button {
  margin-top: 10px;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #ff8fab;
  color: white;
}
</style>
</head>

<body>

<header>
  <h1>NessNoodles Mystery Boxes 🎁</h1>
  <p>Fun surprise boxes full of goodies 💖</p>
</header>

<div class="container">
  <h2>Choose your box</h2>

  <div class="products">

    <div class="product">
      <h3>Mini Mystery Box</h3>
      <p>£10</p>
      <a href="https://paypal.me/VFrohloff/10">
        <button>Buy Now</button>
      </a>
    </div>

    <div class="product">
      <h3>Standard Mystery Box</h3>
      <p>£20</p>
      <a href="https://paypal.me/VFrohloff/20">
        <button>Buy Now</button>
      </a>
    </div>

    <div class="product">
      <h3>Deluxe Mystery Box</h3>
      <p>£35</p>
      <a href="https://paypal.me/VFrohloff/35">
        <button>Buy Now</button>
      </a>
    </div>

  </div>
</div>

</body>
</html>
